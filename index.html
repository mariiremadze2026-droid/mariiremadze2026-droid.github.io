<!-- იპოვე function drawBG() და მთლიანად ჩაანაცვლე ამით -->
<script>
function drawBG(){
let t=theme();

/* 🌈 Animated gradient */
let time=Date.now()*0.001;
let shift=(Math.sin(time)+1)/2;

let g=ctx.createLinearGradient(0,0,0,canvas.height);

if(t=="day"){
g.addColorStop(0,`hsl(${190+shift*20},90%,70%)`);
g.addColorStop(1,`hsl(${210+shift*15},100%,92%)`);
}

if(t=="night"){
g.addColorStop(0,"#020617");
g.addColorStop(1,"#1e3a8a");
}

if(t=="rain"){
g.addColorStop(0,"#334155");
g.addColorStop(1,"#0f172a");
}

if(t=="pink"){
g.addColorStop(0,"#ff8fc7");
g.addColorStop(1,"#ffd6ec");
}

if(t=="zombie"){
g.addColorStop(0,"#0a1f0a");
g.addColorStop(1,"#000000");
}

ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* ☁️ Clouds */
if(t!="night" && t!="zombie"){
ctx.fillStyle="rgba(255,255,255,.55)";
for(let c of clouds){
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.arc(c.x+c.r*0.8,c.y+5,c.r*0.8,0,Math.PI*2);
ctx.fill();

c.x+=c.speed;
if(c.x>canvas.width+150)c.x=-150;
}
}

/* ✨ Floating particles / stars */
for(let p of particles){
ctx.fillStyle=t=="night"?"rgba(255,255,255,.9)":"rgba(255,255,255,.35)";
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.y-=p.s;
if(p.y<0){
p.y=canvas.height;
p.x=Math.random()*canvas.width;
}
}

/* ☀️ Sun with glow */
if(t=="day"){
ctx.shadowBlur=25;
ctx.shadowColor="yellow";
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(canvas.width-90,90,40,0,Math.PI*2);
ctx.fill();
ctx.shadowBlur=0;
}

/* 🌙 Moon */
if(t=="night"){
ctx.shadowBlur=18;
ctx.shadowColor="#fff";
ctx.fillStyle="#fff";
ctx.beginPath();
ctx.arc(canvas.width-90,90,30,0,Math.PI*2);
ctx.fill();
ctx.shadowBlur=0;
}

/* 🌧️ Rain lines */
if(t=="rain"){
ctx.strokeStyle="rgba(255,255,255,.35)";
for(let i=0;i<50;i++){
let x=(i*40 + time*250)%canvas.width;
let y=(i*30 + time*500)%canvas.height;
ctx.beginPath();
ctx.moveTo(x,y);
ctx.lineTo(x-8,y+18);
ctx.stroke();
}
}

/* 🌸 Pink flowers */
if(t=="pink"){
for(let i=0;i<12;i++){
let x=(i*90 + time*40)%canvas.width;
let y=80 + Math.sin(time+i)*20;
ctx.fillStyle="rgba(255,105,180,.7)";
ctx.beginPath();
ctx.arc(x,y,8,0,Math.PI*2);
ctx.fill();
}
}

/* ☣️ Zombie fog */
if(t=="zombie"){
ctx.fillStyle="rgba(0,255,0,.06)";
ctx.fillRect(0,0,canvas.width,canvas.height);
}
}
</script>
