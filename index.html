<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Swipe Ball Worlds</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial}
canvas{display:block;width:100%;height:100%}

#ui{
position:fixed;top:0;left:0;width:100%;
display:flex;justify-content:space-between;
padding:14px;
font-size:20px;
font-weight:bold;
z-index:10;
color:#111;
}

#menu,#gameOver,#levelScreen{
position:fixed;inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.4);
z-index:20;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
text-align:center;
width:min(92%,420px)
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:14px;
background:#111;
color:#fff;
font-size:18px
}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="ui">
<div>🏆 <span id="score">0</span></div>
<div>🎯 Level <span id="level">1</span>/20</div>
</div>

<div id="menu">
<div class="card">
<h1>🔥 Swipe Ball Worlds</h1>
<button onclick="startGame()">▶ Start</button>
</div>
</div>

<div id="gameOver" class="hidden">
<div class="card">
<h1>💀 Game Over</h1>
<button onclick="startGame()">🔄 Restart</button>
</div>
</div>

<div id="levelScreen" class="hidden">
<div class="card">
<h1 id="levelText">Level Complete</h1>
<button onclick="nextLevel()">➡ Next</button>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* GAME */
let running=false;
let score=0;
let level=1;

let enemies=[];
let spawnTimer=0;

/* SPEED */
let baseSpeed = 10;
let speedBoost = 1;

/* BALL */
const ball={x:0,y:0,r:24};

/* 🌍 THEMES */
function getTheme(lv){
if(lv<=4) return "day";
if(lv<=8) return "night";
if(lv<=12) return "rain";
if(lv<=16) return "pink";
return "zombie";
}

/* BACKGROUND */
function drawBackground(){
let t=getTheme(level);

if(t=="day"){
ctx.fillStyle="#bfefff";
}

if(t=="night"){
ctx.fillStyle="#0b1020";
}

if(t=="rain"){
ctx.fillStyle="#2b3a67";
}

if(t=="pink"){
ctx.fillStyle="#ffb6d5";
}

if(t=="zombie"){
ctx.fillStyle="#1a2b1a";
}

ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* START */
function startGame(){
running=true;
score=0;
level=1;
speedBoost=1;
enemies=[];

ball.x=canvas.width/2;
ball.y=canvas.height-140;

document.getElementById("menu").classList.add("hidden");
document.getElementById("gameOver").classList.add("hidden");
document.getElementById("levelScreen").classList.add("hidden");
}

/* NEXT */
function nextLevel(){
level++;
if(level>20){
alert("🏆 YOU WIN!");
startGame();
return;
}

score=0;
speedBoost=1;
enemies=[];
document.getElementById("levelScreen").classList.add("hidden");

ball.x=canvas.width/2;
ball.y=canvas.height-140;
}

/* CONTROL */
let sx=0;

canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
});

canvas.addEventListener("touchmove",e=>{
if(!running)return;

let x=e.touches[0].clientX;
ball.x += (x-sx)*1.7;
sx=x;

},{passive:true});

/* SPAWN */
function spawn(){
enemies.push({
x:Math.random()*(canvas.width-50),
y:-60,
w:50,
h:50
});
}

/* UPDATE */
function update(){
if(!running)return;

/* speed */
speedBoost += 0.002 + level*0.0004;
if(speedBoost>1.35) speedBoost=1.35;

let speed = baseSpeed * speedBoost;

/* spawn harder */
spawnTimer++;
if(spawnTimer > Math.max(20-level,6)){
spawnTimer=0;
spawn();
}

/* enemies */
for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y += speed;

/* collision */
let cx=Math.max(e.x,Math.min(ball.x,e.x+e.w));
let cy=Math.max(e.y,Math.min(ball.y,e.y+e.h));

let dx=ball.x-cx;
let dy=ball.y-cy;

if(dx*dx+dy*dy<ball.r*ball.r){
running=false;
document.getElementById("gameOver").classList.remove("hidden");
}

if(e.y>canvas.height+80){
enemies.splice(i,1);
}
}

/* score */
score+=level;
document.getElementById("score").textContent=score;
document.getElementById("level").textContent=level;

/* level complete */
if(score>=1000*level){
document.getElementById("levelText").innerText=
"Level "+level+" Complete ("+getTheme(level)+")";
document.getElementById("levelScreen").classList.remove("hidden");
}
}

/* DRAW */
function draw(){
drawBackground();

/* enemies */
ctx.fillStyle="#000";
for(let e of enemies){
ctx.fillRect(e.x,e.y,e.w,e.h);
}

/* ball */
ctx.fillStyle="#111";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
