<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Fast Swipe Ball</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial}
canvas{display:block;width:100%;height:100%}

#ui{
position:fixed;top:0;left:0;width:100%;
padding:14px;
display:flex;justify-content:space-between;
font-size:22px;
font-weight:bold;
color:#111;
z-index:10;
}

#menu,#gameOver{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
background:rgba(0,0,0,.35);
z-index:20;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
text-align:center;
width:min(92%,420px)
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:14px;
background:#111;
color:#fff;
font-size:20px
}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="ui">
<div>🏆 <span id="score">0</span></div>
<div>⭐ <span id="best">0</span></div>
</div>

<div id="menu">
<div class="card">
<h1>⚡ FAST MODE</h1>
<button onclick="startGame()">▶ დაწყება</button>
</div>
</div>

<div id="gameOver" class="hidden">
<div class="card">
<h1>💀 დასრულდა</h1>
<p>ქულა: <b id="finalScore">0</b></p>
<button onclick="startGame()">🔄 თავიდან</button>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");
const finalScore=document.getElementById("finalScore");

let best=+localStorage.getItem("swipeBest")||0;
bestEl.textContent=best;

let running=false;
let score=0;

/* ⚡ SPEED BOOST */
let fallSpeed=9;   // 🔥 ადრე ~5 იყო
let spawnTimer=0;

const ball={
x:0,y:0,r:24
};

let enemies=[];

/* 🌤️ CLOUDS */
let clouds=[];
for(let i=0;i<6;i++){
clouds.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight*0.5,
r:30+Math.random()*40,
speed:1.2+Math.random()*1.5   // 🔥 faster clouds
});
}

function drawSun(){
ctx.fillStyle="yellow";
ctx.shadowBlur=25;
ctx.shadowColor="yellow";

ctx.beginPath();
ctx.arc(innerWidth-100,100,40,0,Math.PI*2);
ctx.fill();

ctx.shadowBlur=0;
}

function drawCloud(c){
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();
ctx.beginPath();
ctx.arc(c.x+c.r*0.8,c.y+10,c.r*0.8,0,Math.PI*2);
ctx.fill();
ctx.beginPath();
ctx.arc(c.x-c.r*0.8,c.y+10,c.r*0.8,0,Math.PI*2);
ctx.fill();
}

function updateClouds(){
for(let c of clouds){
c.x+=c.speed;
if(c.x>innerWidth+120){
c.x=-120;
c.y=Math.random()*innerHeight*0.5;
}
}
}

/* RESET */
function reset(){
score=0;
fallSpeed=9;
spawnTimer=0;
enemies=[];
scoreEl.textContent=0;

ball.x=canvas.width/2;
ball.y=canvas.height-140;
}

/* START */
function startGame(){
reset();
running=true;
document.getElementById("menu").classList.add("hidden");
document.getElementById("gameOver").classList.add("hidden");
}

/* CONTROL */
let sx=0,sy=0;

canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
});

canvas.addEventListener("touchmove",e=>{
if(!running)return;

let x=e.touches[0].clientX;
let y=e.touches[0].clientY;

ball.x += (x-sx)*1.5;
ball.y += (y-sy)*1.5;

sx=x; sy=y;
},{passive:true});

/* ENEMY */
function spawn(){
enemies.push({
x:Math.random()*(canvas.width-40),
y:-60,
w:40,h:50
});
}

/* DRAW */
function drawBall(){
ctx.fillStyle="#111";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

function drawEnemy(e){
ctx.fillStyle="#f5c28b";
ctx.fillRect(e.x,e.y,e.w,e.h);
}

/* UPDATE */
function update(){
if(!running)return;

/* ⚡ SPAWN FASTER */
spawnTimer++;
if(spawnTimer>35){   // 🔥 ადრე 60 იყო
spawnTimer=0;
spawn();
}

for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y+=fallSpeed;

if(
ball.x+ball.r>e.x &&
ball.x-ball.r<e.x+e.w &&
ball.y+ball.r>e.y &&
ball.y-ball.r<e.y+e.h
){
endGame();
}

if(e.y>canvas.height+60) enemies.splice(i,1);
}

/* ⚡ SCORE FASTER */
score+=2;
scoreEl.textContent=score;

/* ⚡ SPEED INCREASE */
if(score%150===0){
fallSpeed+=1.2;
}

updateClouds();
}

/* END */
function endGame(){
running=false;

if(score>best){
best=score;
localStorage.setItem("swipeBest",best);
bestEl.textContent=best;
}

finalScore.textContent=score;
document.getElementById("gameOver").classList.remove("hidden");
}

/* DRAW */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

/* sky */
let g=ctx.createLinearGradient(0,0,0,canvas.height);
g.addColorStop(0,"#87e7ff");
g.addColorStop(1,"#d8ff9e");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* sun + clouds */
drawSun();
for(let c of clouds) drawCloud(c);

/* game objects */
for(let e of enemies) drawEnemy(e);
drawBall();
}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
