<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Swipe Ball + YouTube Music</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial}

canvas{display:block;width:100%;height:100%}

#ui{
position:fixed;top:0;left:0;width:100%;
display:flex;justify-content:space-between;
padding:12px;
font-size:20px;
font-weight:bold;
z-index:10;
color:#111;
}

#musicPanel{
position:fixed;
top:60px;
right:10px;
z-index:20;
background:#111;
padding:10px;
border-radius:12px;
color:white;
width:200px;
}

#musicBtn{
width:100%;
padding:8px;
border:none;
border-radius:8px;
margin-top:5px;
}

#ytLink{
width:100%;
margin-top:5px;
font-size:12px;
}

#menu,#gameOver{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
background:rgba(0,0,0,.35);
z-index:30;
}

.card{
background:#fff;
padding:25px;
border-radius:22px;
text-align:center;
width:min(92%,420px)
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:14px;
background:#111;
color:#fff;
font-size:20px
}

.hidden{display:none!important}

/* hidden youtube player */
#ytPlayer{
position:fixed;
width:1px;
height:1px;
left:-9999px;
top:-9999px;
}
</style>
</head>
<body>

<div id="ui">
<div>🏆 <span id="score">0</span></div>
<div>⭐ <span id="best">0</span></div>
</div>

<!-- 🎵 MUSIC PANEL -->
<div id="musicPanel">
<div>🎵 YouTube Music</div>

<input id="ytLink" placeholder="Paste YouTube link">

<button id="musicBtn">▶ Play Music</button>
</div>

<div id="menu">
<div class="card">
<h1>🔥 Swipe Ball</h1>
<button onclick="startGame()">▶ დაწყება</button>
</div>
</div>

<div id="gameOver" class="hidden">
<div class="card">
<h1>💀 დასრულდა</h1>
<p>ქულა: <b id="finalScore">0</b></p>
<button onclick="startGame()">🔄 თავიდან</button>
</div>
</div>

<canvas id="game"></canvas>

<!-- 🎬 YouTube iframe -->
<iframe id="ytPlayer"
src=""
frameborder="0"
allow="autoplay"></iframe>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");
const finalScore=document.getElementById("finalScore");

const ytLink=document.getElementById("ytLink");
const ytPlayer=document.getElementById("ytPlayer");
const musicBtn=document.getElementById("musicBtn");

let running=false;
let score=0;
let fallSpeed=5;
let spawnTimer=0;

let best=+localStorage.getItem("swipeBest")||0;
bestEl.textContent=best;

const ball={
x:0,y:0,r:24
};

let enemies=[];

/* 🎬 YouTube parser */
function getVideoId(url){
let match=url.match(/(?:youtu\.be\/|v=|\/embed\/)([\w-]+)/);
return match?match[1]:null;
}

/* 🎵 PLAY MUSIC */
musicBtn.onclick=()=>{
let url=ytLink.value;
let id=getVideoId(url);

if(!id){
alert("❌ YouTube link არასწორია");
return;
}

/* embed autoplay */
ytPlayer.src=`https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}`;
musicBtn.textContent="🔊 Playing...";
};

/* GAME */
function reset(){
score=0;
fallSpeed=5;
spawnTimer=0;
enemies=[];
scoreEl.textContent=0;

ball.x=canvas.width/2;
ball.y=canvas.height-140;
}

function startGame(){
reset();
running=true;
document.getElementById("menu").classList.add("hidden");
document.getElementById("gameOver").classList.add("hidden");
}

/* CONTROL */
let sx=0,sy=0;

canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
});

canvas.addEventListener("touchmove",e=>{
if(!running)return;

let x=e.touches[0].clientX;
let y=e.touches[0].clientY;

ball.x += (x-sx)*1.4;
ball.y += (y-sy)*1.4;

sx=x; sy=y;
},{passive:true});

/* enemies */
function spawn(){
enemies.push({
x:Math.random()*(canvas.width-40),
y:-60,
w:40,h:50
});
}

/* draw */
function drawBall(){
ctx.fillStyle="#111";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

function drawEnemy(e){
ctx.fillStyle="#f5c28b";
ctx.fillRect(e.x,e.y,e.w,e.h);
}

/* update */
function update(){
if(!running)return;

spawnTimer++;
if(spawnTimer>60){
spawnTimer=0;
spawn();
}

for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y+=fallSpeed;

if(
ball.x+ball.r>e.x &&
ball.x-ball.r<e.x+e.w &&
ball.y+ball.r>e.y &&
ball.y-ball.r<e.y+e.h
){
end();
}

if(e.y>canvas.height+60) enemies.splice(i,1);
}

score++;
scoreEl.textContent=score;
}

/* end */
function end(){
running=false;

if(score>best){
best=score;
localStorage.setItem("swipeBest",best);
bestEl.textContent=best;
}

finalScore.textContent=score;
document.getElementById("gameOver").classList.remove("hidden");
}

/* loop */
function loop(){
update();
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#d8ff9e";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let e of enemies) drawEnemy(e);
drawBall();

requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
