<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>INSANE Swipe Ball</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial}
canvas{display:block;width:100%;height:100%}

#ui{
position:fixed;top:0;left:0;width:100%;
display:flex;justify-content:space-between;
padding:10px;font-size:22px;font-weight:bold;z-index:10
}

#menu,#gameOver{
position:fixed;inset:0;display:flex;justify-content:center;align-items:center;
background:rgba(0,0,0,.5)
}

.card{
background:#fff;padding:25px;border-radius:18px;text-align:center;width:90%;max-width:400px
}

button{
width:100%;padding:15px;margin-top:15px;border:none;
background:#111;color:#fff;font-size:20px;border-radius:12px
}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="ui">
<div>🏆 <span id="score">0</span></div>
<div>⭐ <span id="best">0</span></div>
</div>

<div id="menu">
<div class="card">
<h2>💀 INSANE MODE</h2>
<p>ეს არის ძალიან სწრაფი თამაში</p>
<button onclick="startGame()">▶ დაწყება</button>
</div>
</div>

<div id="gameOver" class="hidden">
<div class="card">
<h2>💥 დაინგრა</h2>
<p>ქულა: <b id="finalScore">0</b></p>
<button onclick="startGame()">🔄 თავიდან</button>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");
const menu=document.getElementById("menu");
const gameOver=document.getElementById("gameOver");
const finalScore=document.getElementById("finalScore");

let best=+localStorage.getItem("best")||0;
bestEl.textContent=best;

let running=false;
let score=0;

/* 🔥 INSANE SPEED */
let gravity=0.9;
let fallSpeed=10;

let spawnTimer=0;

const ball={
x:0,y:0,r:22,
vx:0,vy:0
};

let enemies=[];

function reset(){
score=0;
fallSpeed=10;
spawnTimer=0;
enemies=[];
scoreEl.textContent=0;

ball.x=canvas.width/2;
ball.y=canvas.height-150;
ball.vx=0;
ball.vy=-14;
}

function startGame(){
reset();
running=true;
menu.classList.add("hidden");
gameOver.classList.add("hidden");
}

/* swipe */
let startX=0;

canvas.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

canvas.addEventListener("touchmove",e=>{
if(!running)return;
let x=e.touches[0].clientX;
ball.vx=(x-startX)*0.35; // ⚡ ძალიან სწრაფი
startX=x;
},{passive:true});

let md=false;
canvas.addEventListener("mousedown",e=>{
md=true;
startX=e.clientX;
});
canvas.addEventListener("mouseup",()=>md=false);

canvas.addEventListener("mousemove",e=>{
if(!md||!running)return;
ball.vx=(e.clientX-startX)*0.35;
startX=e.clientX;
});

function spawn(){
enemies.push({
x:Math.random()*(canvas.width-40),
y:-60,
w:40,h:50
});
}

function drawBg(){
let g=ctx.createLinearGradient(0,0,0,canvas.height);
g.addColorStop(0,"#1e3c72");
g.addColorStop(1,"#2a5298");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawBall(){
ctx.fillStyle="#fff";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

function drawEnemy(e){
ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,e.w,e.h);
}

function update(){
if(!running)return;

/* movement */
ball.x+=ball.vx;
ball.vx*=0.97;

ball.vy+=gravity;
ball.y+=ball.vy;

/* walls */
if(ball.x<ball.r){ball.x=ball.r;ball.vx*=-0.8}
if(ball.x>canvas.width-ball.r){ball.x=canvas.width-ball.r;ball.vx*=-0.8}

/* bounce */
if(ball.y>canvas.height-ball.r){
ball.y=canvas.height-ball.r;
ball.vy*=-0.97;
score++;
fallSpeed+=0.35; // 🔥 ძალიან სწრაფი ზრდა
scoreEl.textContent=score;
}

/* spawn INSANE */
spawnTimer++;
if(spawnTimer>12){ // 😈 ძალიან ხშირი
spawnTimer=0;
spawn();
}

for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y+=fallSpeed;

/* collision */
if(
ball.x+ball.r>e.x &&
ball.x-ball.r<e.x+e.w &&
ball.y+ball.r>e.y &&
ball.y-ball.r<e.y+e.h
){
end();
}

if(e.y>canvas.height+100) enemies.splice(i,1);
}
}

function draw(){
drawBg();
for(let e of enemies) drawEnemy(e);
drawBall();
}

function end(){
running=false;

if(score>best){
best=score;
localStorage.setItem("best",best);
bestEl.textContent=best;
}

finalScore.textContent=score;
gameOver.classList.remove("hidden");
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
