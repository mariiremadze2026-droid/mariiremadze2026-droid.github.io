<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Swipe Ball Tournament</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial}
canvas{display:block;width:100%;height:100%}

#ui{
position:fixed;top:0;left:0;width:100%;
display:flex;justify-content:space-between;
padding:12px;
font-size:20px;
font-weight:bold;
z-index:10;
color:#111;
}

#menu,#levelWin{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
background:rgba(0,0,0,.4);
z-index:20;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
text-align:center;
width:min(92%,420px)
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-size:18px
}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="ui">
<div>🏆 <span id="score">0</span></div>
<div>🎯 Level <span id="level">1</span>/20</div>
</div>

<div id="menu">
<div class="card">
<h1>🏁 TOURNAMENT MODE</h1>
<button onclick="startGame()">▶ Start</button>
</div>
</div>

<div id="levelWin" class="hidden">
<div class="card">
<h1 id="title">Level Complete</h1>
<p id="stars">⭐⭐⭐</p>
<button onclick="nextLevel()">➡ Next Level</button>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* UI */
const scoreEl=document.getElementById("score");
const levelEl=document.getElementById("level");
const starsEl=document.getElementById("stars");
const title=document.getElementById("title");

/* GAME */
let running=false;
let score=0;
let level=1;

const MAX_LEVEL=20;

/* SPEED */
let speed=5;
let spawnTimer=0;

const ball={
x:0,y:0,r:22
};

let enemies=[];

/* START */
function startGame(){
running=true;
level=1;
score=0;
speed=5;
enemies=[];

ball.x=canvas.width/2;
ball.y=canvas.height-140;

document.getElementById("menu").classList.add("hidden");
}

/* NEXT LEVEL */
function nextLevel(){
level++;

if(level>MAX_LEVEL){
alert("🏆 Tournament Finished!");
location.reload();
return;
}

score=0;
enemies=[];
speed += 1.2;

document.getElementById("levelWin").classList.add("hidden");

levelEl.textContent=level;
}

/* TOUCH CONTROL */
let sx=0,sy=0;

canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
});

canvas.addEventListener("touchmove",e=>{
if(!running)return;

let x=e.touches[0].clientX;
let y=e.touches[0].clientY;

ball.x += (x-sx)*1.6;
ball.y += (y-sy)*1.6;

sx=x; sy=y;

/* clamp */
if(ball.x<ball.r) ball.x=ball.r;
if(ball.x>canvas.width-ball.r) ball.x=canvas.width-ball.r;
if(ball.y<ball.r) ball.y=ball.r;
if(ball.y>canvas.height-ball.r) ball.y=canvas.height-ball.r;

},{passive:true});

/* ENEMY (BIG BLACK) */
function spawn(){
enemies.push({
x:Math.random()*(canvas.width-60),
y:-80,
w:60,
h:70
});
}

/* DRAW */
function drawBall(){
ctx.fillStyle="#111";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

function drawEnemy(e){
ctx.fillStyle="#000";
ctx.fillRect(e.x,e.y,e.w,e.h);
}

/* STARS */
function calcStars(){
if(score>=9000) return 3;
if(score>=6000) return 2;
if(score>=3000) return 1;
return 0;
}

/* LEVEL WIN */
function win(){
running=false;

let s=calcStars();
starsEl.textContent="⭐".repeat(Math.max(1,s));

title.textContent="Level "+level+" Complete";

document.getElementById("levelWin").classList.remove("hidden");
}

/* UPDATE */
function update(){
if(!running)return;

/* difficulty scaling */
speed += 0.002;

spawnTimer++;
if(spawnTimer > Math.max(45 - level*2, 12)){
spawnTimer=0;
spawn();
}

for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y += speed;

if(
ball.x+ball.r>e.x &&
ball.x-ball.r<e.x+e.w &&
ball.y+ball.r>e.y &&
ball.y-ball.r<e.y+e.h
){
alert("💀 Game Over");
location.reload();
}

if(e.y>canvas.height+100) enemies.splice(i,1);
}

score += 2;
scoreEl.textContent=score;

/* level condition */
if(score>=10000){
win();
}
}

/* DRAW */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

let g=ctx.createLinearGradient(0,0,0,canvas.height);
g.addColorStop(0,"#87e7ff");
g.addColorStop(1,"#d8ff9e");

ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let e of enemies) drawEnemy(e);
drawBall();
}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
