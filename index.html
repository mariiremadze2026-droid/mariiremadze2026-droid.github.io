<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Swipe Ball Ultimate</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background:#000;
}
canvas{
display:block;
width:100%;
height:100%;
touch-action:none;
}

#ui{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:12px;
font-size:20px;
font-weight:bold;
color:#fff;
z-index:10;
mix-blend-mode:difference;
}

.overlay{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.45);
z-index:20;
}

.card{
background:#fff;
padding:24px;
border-radius:18px;
text-align:center;
width:min(92%,420px);
box-shadow:0 12px 30px rgba(0,0,0,.25);
}

h1{margin-bottom:10px}
p{opacity:.7;margin-top:6px}

button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-size:18px;
font-weight:bold;
}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="ui">
<div>🏆 <span id="score">0</span></div>
<div>🎯 <span id="level">1</span>/20</div>
</div>

<div id="menu" class="overlay">
<div class="card">
<h1>🔥 Swipe Ball</h1>
<p>გაასრიალე ბურთი და აირიდე დაბრკოლებები</p>
<button onclick="startGame()">▶ Start</button>
</div>
</div>

<div id="gameOver" class="overlay hidden">
<div class="card">
<h1>💀 Game Over</h1>
<button onclick="startGame()">🔄 Restart</button>
</div>
</div>

<div id="levelBox" class="overlay hidden">
<div class="card">
<h1 id="lvlText">Level Complete</h1>
<button onclick="nextLevel()">➡ Next Level</button>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const scoreEl=document.getElementById("score");
const levelEl=document.getElementById("level");
const lvlText=document.getElementById("lvlText");

const menu=document.getElementById("menu");
const gameOver=document.getElementById("gameOver");
const levelBox=document.getElementById("levelBox");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* STATE */
let running=false;
let score=0;
let level=1;
let enemies=[];
let spawnTimer=0;

/* SPEED (შენელებული) */
let baseSpeed=10.9;
let speedBoost=1;

/* PLAYER */
const ball={
x:0,
y:0,
r:24
};

/* FX */
let clouds=[];
let particles=[];

function initFX(){
clouds=[];
particles=[];

for(let i=0;i<8;i++){
clouds.push({
x:Math.random()*canvas.width,
y:Math.random()*120,
r:30+Math.random()*40,
speed:0.2+Math.random()*0.4
});
}

for(let i=0;i<55;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:1+Math.random()*2,
s:0.2+Math.random()*0.8
});
}
}
initFX();

/* HELPERS */
function resetBall(){
ball.x=canvas.width/2;
ball.y=canvas.height-140;
}

function hideMenus(){
menu.classList.add("hidden");
gameOver.classList.add("hidden");
levelBox.classList.add("hidden");
}

function theme(){
if(level<=4)return"day";
if(level<=8)return"night";
if(level<=12)return"rain";
if(level<=16)return"pink";
return"zombie";
}

/* GAME CONTROL */
function startGame(){
running=true;
score=0;
level=1;
speedBoost=1;
spawnTimer=0;
enemies=[];
resetBall();
hideMenus();
}

function nextLevel(){
level++;

if(level>20){
alert("🏆 შენ მოიგე თამაში!");
startGame();
return;
}

running=true;
score=0;
speedBoost=1;
spawnTimer=0;
enemies=[];
resetBall();
levelBox.classList.add("hidden");
}

/* TOUCH CONTROL */
let sx=0;

canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
},{passive:true});

canvas.addEventListener("touchmove",e=>{
if(!running)return;

let x=e.touches[0].clientX;
ball.x+=(x-sx)*2;
sx=x;

if(ball.x<ball.r)ball.x=ball.r;
if(ball.x>canvas.width-ball.r)ball.x=canvas.width-ball.r;
},{passive:true});

/* ENEMY SPAWN */
function spawn(){
let t=theme();
let type="normal";

if(t=="night")type="fast";
if(t=="rain")type="slippery";
if(t=="zombie")type="big";

enemies.push({
x:Math.random()*(canvas.width-50),
y:-60,
w:type=="big"?70:50,
h:type=="big"?70:50,
type:type
});
}

/* BEAUTIFUL ANIMATED BG */
function drawBG(){
let t=theme();
let time=Date.now()*0.001;
let shift=(Math.sin(time)+1)/2;

let g=ctx.createLinearGradient(0,0,0,canvas.height);

if(t=="day"){
g.addColorStop(0,"hsl("+(190+shift*20)+",90%,70%)");
g.addColorStop(1,"hsl("+(210+shift*15)+",100%,92%)");
}else if(t=="night"){
g.addColorStop(0,"#020617");
g.addColorStop(1,"#1e3a8a");
}else if(t=="rain"){
g.addColorStop(0,"#334155");
g.addColorStop(1,"#0f172a");
}else if(t=="pink"){
g.addColorStop(0,"#ff8fc7");
g.addColorStop(1,"#ffd6ec");
}else{
g.addColorStop(0,"#0a1f0a");
g.addColorStop(1,"#000000");
}

ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* clouds */
if(t!="night" && t!="zombie"){
ctx.fillStyle="rgba(255,255,255,.55)";
for(let c of clouds){
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();

ctx.beginPath();
ctx.arc(c.x+c.r*0.8,c.y+5,c.r*0.8,0,Math.PI*2);
ctx.fill();

c.x+=c.speed;
if(c.x>canvas.width+150)c.x=-150;
}
}

/* particles / stars */
for(let p of particles){
ctx.fillStyle=t=="night"?"rgba(255,255,255,.9)":"rgba(255,255,255,.35)";
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.y-=p.s;
if(p.y<0){
p.y=canvas.height;
p.x=Math.random()*canvas.width;
}
}

/* sun */
if(t=="day"){
ctx.save();
ctx.shadowBlur=25;
ctx.shadowColor="yellow";
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(canvas.width-90,90,40,0,Math.PI*2);
ctx.fill();
ctx.restore();
}

/* moon */
if(t=="night"){
ctx.save();
ctx.shadowBlur=18;
ctx.shadowColor="#fff";
ctx.fillStyle="#fff";
ctx.beginPath();
ctx.arc(canvas.width-90,90,30,0,Math.PI*2);
ctx.fill();
ctx.restore();
}

/* rain */
if(t=="rain"){
ctx.strokeStyle="rgba(255,255,255,.35)";
for(let i=0;i<50;i++){
let x=(i*40 + time*250)%canvas.width;
let y=(i*30 + time*500)%canvas.height;
ctx.beginPath();
ctx.moveTo(x,y);
ctx.lineTo(x-8,y+18);
ctx.stroke();
}
}

/* flowers */
if(t=="pink"){
for(let i=0;i<12;i++){
let x=(i*90 + time*40)%canvas.width;
let y=80 + Math.sin(time+i)*20;
ctx.fillStyle="rgba(255,105,180,.7)";
ctx.beginPath();
ctx.arc(x,y,8,0,Math.PI*2);
ctx.fill();
}
}

/* zombie fog */
if(t=="zombie"){
ctx.fillStyle="rgba(0,255,0,.06)";
ctx.fillRect(0,0,canvas.width,canvas.height);
}
}

/* UPDATE */
function update(){
if(!running)return;

/* ცოტა უფრო ნელი ზრდა */
speedBoost+=0.0030;
if(speedBoost>1.3)speedBoost=1.3;

let speed=baseSpeed*speedBoost;

/* spawn */
spawnTimer++;
if(spawnTimer>Math.max(18-level,5)){
spawnTimer=0;
spawn();
}

/* enemies */
for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];

if(e.type=="fast"){
e.y+=speed*1.35;
}else if(e.type=="slippery"){
e.x+=Math.sin(e.y*0.05)*2;
e.y+=speed;
}else if(e.type=="big"){
e.y+=speed*0.8;
}else{
e.y+=speed;
}

/* collision */
let cx=Math.max(e.x,Math.min(ball.x,e.x+e.w));
let cy=Math.max(e.y,Math.min(ball.y,e.y+e.h));
let dx=ball.x-cx;
let dy=ball.y-cy;

if(dx*dx+dy*dy<ball.r*ball.r){
running=false;
gameOver.classList.remove("hidden");
}

/* remove */
if(e.y>canvas.height+100){
enemies.splice(i,1);
}
}

/* score */
score+=level;
scoreEl.textContent=score;
levelEl.textContent=level;

/* next level */
if(score>=1000*level){
running=false;
lvlText.textContent="Level "+level+" Complete";
levelBox.classList.remove("hidden");
}
}

/* DRAW */
function draw(){
drawBG();

/* enemies */
for(let e of enemies){
ctx.fillStyle=
e.type=="fast"?"#ff4444":
e.type=="slippery"?"#44aaff":
e.type=="big"?"#222":
"#000";

ctx.fillRect(e.x,e.y,e.w,e.h);
}

/* player */
ctx.fillStyle="#111";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
