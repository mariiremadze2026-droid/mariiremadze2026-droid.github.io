<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Hard Swipe Ball + Music</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial}

canvas{display:block;width:100%;height:100%}

#ui{
position:fixed;top:0;left:0;width:100%;
display:flex;justify-content:space-between;
padding:12px;
font-size:22px;
font-weight:bold;
color:white;
text-shadow:0 0 10px black;
z-index:10;
}

#menu,#gameOver{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
background:rgba(0,0,0,.6)
}

.card{
background:#111;color:white;
padding:25px;border-radius:18px;
text-align:center;width:90%;max-width:400px
}

button{
width:100%;padding:15px;margin-top:10px;
border:none;border-radius:12px;
background:linear-gradient(90deg,#00f5ff,#7a5cff);
color:white;font-size:18px
}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="ui">
<div>🏆 <span id="score">0</span></div>
<div>💀 HARD MODE</div>
</div>

<div id="menu">
<div class="card">
<h2>🎮 HARD MODE</h2>
<p>მტრები სწრაფად იზრდება</p>
<button onclick="startGame()">▶ დაწყება</button>
</div>
</div>

<div id="gameOver" class="hidden">
<div class="card">
<h2>💥 დასრულდა</h2>
<p>ქულა: <b id="finalScore">0</b></p>
<button onclick="startGame()">🔄 თავიდან</button>
</div>
</div>

<canvas id="game"></canvas>

<!-- 🎵 MUSIC -->
<audio id="music1" src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_7b7b2c4b4b.mp3"></audio>
<audio id="music2" src="https://cdn.pixabay.com/download/audio/2023/03/01/audio_7d6b7b2c2a.mp3"></audio>
<audio id="music3" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c9f7c.mp3"></audio>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

const scoreEl=document.getElementById("score");
const menu=document.getElementById("menu");
const gameOver=document.getElementById("gameOver");
const finalScore=document.getElementById("finalScore");

/* 🎵 MUSIC */
const m1=document.getElementById("music1");
const m2=document.getElementById("music2");
const m3=document.getElementById("music3");

function stopMusic(){
[m1,m2,m3].forEach(m=>{
m.pause();
m.currentTime=0;
});
}

function playMusic(type){
stopMusic();
if(type===1) m1.play();
if(type===2) m2.play();
if(type===3) m3.play();
}

let running=false;
let score=0;

let fallSpeed=10;
let spawnTimer=0;
let difficulty=1;

const ball={
x:0,y:0,r:22
};

let enemies=[];

function resetGame(){
score=0;
fallSpeed=10;
spawnTimer=0;
difficulty=1;
enemies=[];
scoreEl.textContent=0;

ball.x=canvas.width/2;
ball.y=canvas.height-140;
}

function startGame(){
resetGame();
running=true;
menu.classList.add("hidden");
gameOver.classList.add("hidden");

/* 🎵 start music */
playMusic(1);
}

/* CONTROL */
let sx=0,sy=0;

canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
});

canvas.addEventListener("touchmove",e=>{
if(!running)return;

let x=e.touches[0].clientX;
let y=e.touches[0].clientY;

ball.x += (x-sx)*1.4;
ball.y += (y-sy)*1.4;

sx=x; sy=y;
},{passive:true});

/* enemy */
function spawn(){
enemies.push({
x:Math.random()*(canvas.width-40),
y:-60,w:40,h:50
});
}

/* bg */
function drawBg(){
let g=ctx.createLinearGradient(0,0,0,canvas.height);
g.addColorStop(0,"#141e30");
g.addColorStop(1,"#243b55");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* ball */
function drawBall(){
ctx.fillStyle="#00f5ff";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

/* enemy */
function drawEnemy(e){
ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,e.w,e.h);
}

/* game over */
function end(){
running=false;
stopMusic();
playMusic(3);

finalScore.textContent=score;
gameOver.classList.remove("hidden");
}

/* update */
function update(){
if(!running)return;

/* spawn faster every level */
spawnTimer++;
if(spawnTimer > Math.max(20 - difficulty*2, 6)){
spawnTimer=0;
spawn();
}

/* move enemies */
for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y+=fallSpeed;

/* collision */
if(
ball.x+ball.r>e.x &&
ball.x-ball.r<e.x+e.w &&
ball.y+ball.r>e.y &&
ball.y-ball.r<e.y+e.h
){
end();
}

if(e.y>canvas.height+80) enemies.splice(i,1);
}

/* score */
score++;
scoreEl.textContent=score;

/* 🔥 difficulty system */
if(score % 200 === 0){
difficulty++;
fallSpeed+=1.5;

/* change music */
if(difficulty===2) playMusic(2);
}
}

/* draw */
function draw(){
drawBg();
for(let e of enemies) drawEnemy(e);
drawBall();
}

/* loop */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
