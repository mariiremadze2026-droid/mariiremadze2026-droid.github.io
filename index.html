<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Fast Swipe Ball FIXED</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial}
canvas{display:block;width:100%;height:100%}

#ui{
position:fixed;top:0;left:0;width:100%;
display:flex;justify-content:space-between;
padding:12px;
font-size:20px;
font-weight:bold;
z-index:10;
color:#111;
}

#menu,#gameOver{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
background:rgba(0,0,0,.4);
z-index:20;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
text-align:center;
width:min(92%,420px)
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-size:18px
}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="ui">
<div>🏆 <span id="score">0</span></div>
<div>⚡ <span id="speed">1.0</span>x</div>
</div>

<div id="menu">
<div class="card">
<h1>⚡ FAST FIX GAME</h1>
<button onclick="startGame()">▶ Start</button>
</div>
</div>

<div id="gameOver" class="hidden">
<div class="card">
<h1>💀 Game Over</h1>
<p>Score: <b id="finalScore"></b></p>
<button onclick="location.reload()">🔄 Restart</button>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* UI */
const scoreEl=document.getElementById("score");
const speedEl=document.getElementById("speed");
const finalScore=document.getElementById("finalScore");

/* GAME */
let running=false;
let score=0;

/* ⚡ MUCH FASTER START */
let baseSpeed=6;      // 🔥 ადრე იყო 4.5 → ახლა სწრაფია
let speedBoost=1;

let enemies=[];
let spawnTimer=0;

const ball={
x:0,
y:0,
r:22
};

/* START */
function startGame(){
running=true;
score=0;
speedBoost=1;
enemies=[];

ball.x=canvas.width/2;
ball.y=canvas.height-140;

document.getElementById("menu").classList.add("hidden");
}

/* TOUCH CONTROL */
let sx=0,sy=0;

canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
});

canvas.addEventListener("touchmove",e=>{
if(!running)return;

let x=e.touches[0].clientX;
let y=e.touches[0].clientY;

/* movement */
ball.x += (x-sx)*1.6;
ball.y += (y-sy)*1.6;

sx=x;
sy=y;

/* ✅ HARD CLAMP (FIXED EDGE BUG) */
if(ball.x < ball.r) ball.x = ball.r;
if(ball.x > canvas.width - ball.r) ball.x = canvas.width - ball.r;

if(ball.y < ball.r) ball.y = ball.r;
if(ball.y > canvas.height - ball.r) ball.y = canvas.height - ball.r;

},{passive:true});

/* ENEMY */
function spawn(){
enemies.push({
x:Math.random()*(canvas.width-40),
y:-60,
w:40,
h:50
});
}

/* DRAW */
function drawBall(){
ctx.fillStyle="#111";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

function drawEnemy(e){
ctx.fillStyle="#ff3b3b";
ctx.fillRect(e.x,e.y,e.w,e.h);
}

/* UPDATE */
function update(){
if(!running)return;

/* ⚡ REAL SPEED (FEELS FAST FROM START) */
speedBoost += 0.003;
let speed = baseSpeed * speedBoost;

/* spawn faster over time */
spawnTimer++;
if(spawnTimer > Math.max(45 - speedBoost*5, 12)){
spawnTimer=0;
spawn();
}

for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y += speed;

if(
ball.x+ball.r>e.x &&
ball.x-ball.r<e.x+e.w &&
ball.y+ball.r>e.y &&
ball.y-ball.r<e.y+e.h
){
gameOver();
}

if(e.y>canvas.height+60) enemies.splice(i,1);
}

/* score */
score += 3;
scoreEl.textContent=score;
speedEl.textContent=speedBoost.toFixed(2);
}

/* GAME OVER */
function gameOver(){
running=false;
finalScore.textContent=score;
document.getElementById("gameOver").classList.remove("hidden");
}

/* DRAW LOOP */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

let g=ctx.createLinearGradient(0,0,0,canvas.height);
g.addColorStop(0,"#87e7ff");
g.addColorStop(1,"#d8ff9e");

ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let e of enemies) drawEnemy(e);
drawBall();
}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
