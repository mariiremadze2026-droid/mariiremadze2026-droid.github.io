<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shadow City: Ultimate War</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{overflow:hidden;background:#111;color:#fff;touch-action:none}
#menu,#hud,#gameOver,#shop{
position:absolute;left:0;top:0;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:linear-gradient(180deg,#111,#222);
z-index:10
}
h1{font-size:32px;color:#0ff;text-shadow:0 0 15px #0ff;margin-bottom:20px}
button{
padding:15px 25px;margin:8px;border:none;border-radius:12px;
background:#0ff;color:#000;font-size:18px;font-weight:bold
}
#gameCanvas{background:#222;display:none}
#hud{
display:none;justify-content:flex-start;align-items:flex-start;
padding:10px;background:none;z-index:5
}
#stats{
background:rgba(0,0,0,.5);padding:10px;border-radius:10px
}
#controls{
position:absolute;bottom:20px;width:100%;display:flex;
justify-content:space-between;padding:20px;pointer-events:none
}
.pad,.act{
width:90px;height:90px;border-radius:50%;
background:rgba(255,255,255,.15);border:2px solid #fff;
display:flex;align-items:center;justify-content:center;
font-size:30px;pointer-events:auto
}
#shoot{background:rgba(255,0,0,.4)}
#power{background:rgba(0,255,255,.3)}
#shop{
display:none;background:rgba(0,0,0,.9);z-index:20
}
</style>
</head>
<body>

<div id="menu">
<h1>🌆 Shadow City</h1>
<button onclick="startGame()">▶ თამაში დაწყება</button>
<button onclick="openShop()">🛒 მაღაზია</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="hud">
<div id="stats">
❤️ სიცოცხლე: <span id="hp">100</span><br>
💰 ფული: <span id="money">0</span><br>
🎯 მოკლული: <span id="kills">0</span>
</div>
</div>

<div id="controls" style="display:none">
<div>
<div class="pad" id="left">⬅️</div>
<div class="pad" id="right">➡️</div>
</div>
<div>
<div class="act" id="shoot">🔫</div>
<div class="act" id="power">⚡</div>
</div>
</div>

<div id="shop">
<h1>🛒 მაღაზია</h1>
<button onclick="buyHeal()">❤️ სიცოცხლე +50 (50$)</button>
<button onclick="buyPower()">⚡ ძალა (100$)</button>
<button onclick="closeShop()">⬅ უკან</button>
</div>

<div id="gameOver" style="display:none">
<h1>💀 Game Over</h1>
<button onclick="location.reload()">🔄 თავიდან</button>
</div>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let player,enemies=[],bullets=[],money=0,kills=0,gameRunning=false,powerMode=false;

function resetPlayer(){
player={x:100,y:canvas.height-120,w:40,h:40,color:"#0ff",hp:100,speed:5};
}

function startGame(){
document.getElementById("menu").style.display="none";
canvas.style.display="block";
document.getElementById("hud").style.display="flex";
document.getElementById("controls").style.display="flex";
resetPlayer();
gameRunning=true;
spawnEnemy();
loop();
}

function spawnEnemy(){
setInterval(()=>{
if(!gameRunning)return;
enemies.push({
x:canvas.width+50,
y:canvas.height-120,
w:40,h:40,color:"red",hp:1,speed:2+Math.random()*2
});
},1200);
}

function shoot(){
bullets.push({x:player.x+35,y:player.y+20,w:15,h:5,speed:8});
}

function activatePower(){
if(powerMode)return;
powerMode=true;
player.color="#ff0";
setTimeout(()=>{powerMode=false;player.color="#0ff"},5000);
}

function update(){
bullets.forEach((b,i)=>{
b.x+=b.speed;
if(b.x>canvas.width)bullets.splice(i,1);
});
enemies.forEach((e,ei)=>{
e.x-=e.speed;
if(e.x<player.x+player.w && e.x+e.w>player.x){
player.hp-=1;
if(player.hp<=0)endGame();
}
bullets.forEach((b,bi)=>{
if(b.x<e.x+e.w && b.x+b.w>e.x && b.y<e.y+e.h && b.y+b.h>e.y){
enemies.splice(ei,1);
bullets.splice(bi,1);
money+=10;
kills++;
}
});
});
document.getElementById("hp").innerText=player.hp;
document.getElementById("money").innerText=money;
document.getElementById("kills").innerText=kills;
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#333";
ctx.fillRect(0,canvas.height-80,canvas.width,80);

ctx.fillStyle=player.color;
ctx.fillRect(player.x,player.y,player.w,player.h);

ctx.fillStyle="#fff";
bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

enemies.forEach(e=>{
ctx.fillStyle=e.color;
ctx.fillRect(e.x,e.y,e.w,e.h);
});
}

function loop(){
if(!gameRunning)return;
update();
draw();
requestAnimationFrame(loop);
}

function endGame(){
gameRunning=false;
document.getElementById("gameOver").style.display="flex";
}

function openShop(){
document.getElementById("shop").style.display="flex";
}
function closeShop(){
document.getElementById("shop").style.display="none";
}
function buyHeal(){
if(money>=50){money-=50;player.hp=Math.min(100,player.hp+50);}
}
function buyPower(){
if(money>=100){money-=100;activatePower();}
}

document.getElementById("left").ontouchstart=()=>moveLeft=true;
document.getElementById("left").ontouchend=()=>moveLeft=false;
document.getElementById("right").ontouchstart=()=>moveRight=true;
document.getElementById("right").ontouchend=()=>moveRight=false;
document.getElementById("shoot").ontouchstart=shoot;
document.getElementById("power").ontouchstart=activatePower;

let moveLeft=false,moveRight=false;
setInterval(()=>{
if(moveLeft)player.x-=player.speed;
if(moveRight)player.x+=player.speed;
if(player.x<0)player.x=0;
if(player.x>canvas.width-player.w)player.x=canvas.width-player.w;
},16);
</script>
</body>
</html>
