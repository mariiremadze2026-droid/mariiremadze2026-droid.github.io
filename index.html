<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Swipe Ball FIXED FULL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial}
canvas{display:block;width:100%;height:100%}

#ui{
position:fixed;top:0;left:0;width:100%;
display:flex;justify-content:space-between;
padding:12px;
font-size:20px;
font-weight:bold;
z-index:10;
color:#fff;
mix-blend-mode:difference;
}

#menu,#gameOver,#levelScreen{
position:fixed;inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.4);
z-index:20;
}

.card{
background:#fff;
padding:22px;
border-radius:16px;
text-align:center;
width:min(92%,420px)
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-size:18px
}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="ui">
<div>🏆 <span id="score">0</span></div>
<div>🎯 <span id="level">1</span>/20</div>
</div>

<div id="menu">
<div class="card">
<h1>🔥 Swipe Ball</h1>
<button onclick="startGame()">▶ Start</button>
</div>
</div>

<div id="gameOver" class="hidden">
<div class="card">
<h1>💀 Game Over</h1>
<button onclick="startGame()">🔄 Restart</button>
</div>
</div>

<div id="levelScreen" class="hidden">
<div class="card">
<h1 id="lvlText">Level Complete</h1>
<button onclick="nextLevel()">➡ Next Level</button>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* STATE */
let running=false;
let score=0;
let level=1;

let enemies=[];
let spawnTimer=0;

/* SPEED */
let baseSpeed=14;
let speedBoost=1;

/* BALL */
const ball={x:0,y:0,r:24};

/* CLOUDS + PARTICLES */
let clouds=[];
let particles=[];

for(let i=0;i<8;i++){
clouds.push({
x:Math.random()*innerWidth,
y:Math.random()*120,
r:30+Math.random()*40,
speed:0.3+Math.random()*0.5
});
}

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
r:1+Math.random()*2,
s:0.3+Math.random()*1
});
}

/* START */
function startGame(){
running=true;
score=0;
level=1;
speedBoost=1;
enemies=[];

ball.x=canvas.width/2;
ball.y=canvas.height-140;

document.getElementById("menu").classList.add("hidden");
document.getElementById("gameOver").classList.add("hidden");
document.getElementById("levelScreen").classList.add("hidden");
}

/* THEME */
function theme(){
if(level<=4) return "day";
if(level<=8) return "night";
if(level<=12) return "rain";
if(level<=16) return "pink";
return "zombie";
}

/* NEXT LEVEL */
function nextLevel(){
level++;
if(level>20){
alert("🏆 YOU WIN!");
startGame();
return;
}

score=0;
speedBoost=1;
enemies=[];

ball.x=canvas.width/2;
ball.y=canvas.height-140;

document.getElementById("levelScreen").classList.add("hidden");
}

/* CONTROL */
let sx=0;

canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
});

canvas.addEventListener("touchmove",e=>{
if(!running)return;

let x=e.touches[0].clientX;
ball.x+=(x-sx)*2;
sx=x;

/* bounds */
if(ball.x<ball.r)ball.x=ball.r;
if(ball.x>canvas.width-ball.r)ball.x=canvas.width-ball.r;

},{passive:true});

/* SPAWN */
function spawn(){
let t=theme();
let type="normal";

if(t=="night") type="fast";
if(t=="rain") type="slippery";
if(t=="zombie") type="big";

enemies.push({
x:Math.random()*(canvas.width-50),
y:-60,
w:type=="big"?70:50,
h:type=="big"?70:50,
type:type
});
}

/* BACKGROUND */
function drawBG(){

let t=theme();

let g=ctx.createLinearGradient(0,0,0,canvas.height);

if(t=="day"){g.addColorStop(0,"#7dd3fc");g.addColorStop(1,"#e0f7ff");}
if(t=="night"){g.addColorStop(0,"#050816");g.addColorStop(1,"#0b1b3a");}
if(t=="rain"){g.addColorStop(0,"#1e2f55");g.addColorStop(1,"#0a1425");}
if(t=="pink"){g.addColorStop(0,"#ff9ecf");g.addColorStop(1,"#ffd6e8");}
if(t=="zombie"){g.addColorStop(0,"#0b1a0b");g.addColorStop(1,"#020502");}

ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* clouds */
if(t!="night" && t!="zombie"){
ctx.fillStyle="rgba(255,255,255,0.6)";
for(let c of clouds){
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();

c.x+=c.speed;
if(c.x>canvas.width+100)c.x=-100;
}
}

/* particles */
ctx.fillStyle="rgba(255,255,255,0.4)";
for(let p of particles){
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.y-=p.s;
if(p.y<0)p.y=canvas.height;
}

/* sun / moon */
if(t=="day"){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(canvas.width-100,100,45,0,Math.PI*2);
ctx.fill();
}

if(t=="night"){
ctx.fillStyle="#fff";
ctx.beginPath();
ctx.arc(canvas.width-100,100,35,0,Math.PI*2);
ctx.fill();
}
}

/* UPDATE */
function update(){
if(!running)return;

speedBoost += 0.004;
if(speedBoost>1.3)speedBoost=1.3;

let speed=baseSpeed*speedBoost;

/* spawn */
spawnTimer++;
if(spawnTimer>18-level){
spawnTimer=0;
spawn();
}

/* enemies */
for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];

if(e.type=="fast") e.y+=speed*1.4;
else if(e.type=="slippery"){
e.x+=Math.sin(e.y*0.05)*2;
e.y+=speed;
}
else if(e.type=="big") e.y+=speed*0.8;
else e.y+=speed;

/* collision */
let cx=Math.max(e.x,Math.min(ball.x,e.x+e.w));
let cy=Math.max(e.y,Math.min(ball.y,e.y+e.h));

let dx=ball.x-cx;
let dy=ball.y-cy;

if(dx*dx+dy*dy<ball.r*ball.r){
running=false;
document.getElementById("gameOver").classList.remove("hidden");
}

if(e.y>canvas.height+80) enemies.splice(i,1);
}

/* score */
score+=level;
document.getElementById("score").textContent=score;
document.getElementById("level").textContent=level;

/* level complete */
if(score>=1000*level){
document.getElementById("lvlText").innerText=
"Level "+level+" - "+theme();
document.getElementById("levelScreen").classList.remove("hidden");
}
}

/* DRAW (FIXED) */
function draw(){
drawBG();

/* enemies */
for(let e of enemies){
ctx.fillStyle=
e.type=="fast"?"#ff4444":
e.type=="slippery"?"#44aaff":
e.type=="big"?"#222":
"#000";

ctx.fillRect(e.x,e.y,e.w,e.h);
}

/* ball */
ctx.fillStyle="#111";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
