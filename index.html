<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Swipe Ball PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial}
canvas{display:block;width:100%;height:100%}

#ui{
position:fixed;top:0;left:0;width:100%;
display:flex;justify-content:space-between;
padding:12px;
font-size:20px;
font-weight:bold;
z-index:10;
color:#111;
}

#menu,#gameOver{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
background:rgba(0,0,0,.4);
z-index:20;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
text-align:center;
width:min(92%,420px)
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-size:18px
}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="ui">
<div>🏆 <span id="score">0</span></div>
<div>🎯 Level <span id="level">1</span></div>
</div>

<div id="menu">
<div class="card">
<h1>🎮 Swipe Ball PRO</h1>
<button onclick="startGame()">▶ Start</button>
</div>
</div>

<div id="gameOver" class="hidden">
<div class="card">
<h1>💀 Game Over</h1>
<p>Score: <b id="finalScore"></b></p>
<button onclick="location.reload()">🔄 Restart</button>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* UI */
const scoreEl=document.getElementById("score");
const levelEl=document.getElementById("level");
const finalScore=document.getElementById("finalScore");

/* GAME STATE */
let running=false;
let score=0;
let level=1;
let target=1000;

/* SPEED SYSTEM */
let speed=4.5; // 🎯 normal start speed
let spawnTimer=0;

const ball={
x:0,y:0,r:22
};

let enemies=[];

/* ☁️ CLOUDS */
let clouds=[];
for(let i=0;i<6;i++){
clouds.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight*0.5,
r:25+Math.random()*40,
s:0.5+Math.random()*0.8
});
}

/* ☀️ SUN */
function drawSun(){
ctx.fillStyle="yellow";
ctx.shadowBlur=25;
ctx.shadowColor="yellow";
ctx.beginPath();
ctx.arc(innerWidth-90,90,40,0,Math.PI*2);
ctx.fill();
ctx.shadowBlur=0;
}

function drawCloud(c){
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fill();
ctx.beginPath();
ctx.arc(c.x+c.r*0.7,c.y+10,c.r*0.7,0,Math.PI*2);
ctx.fill();
ctx.beginPath();
ctx.arc(c.x-c.r*0.7,c.y+10,c.r*0.7,0,Math.PI*2);
ctx.fill();
}

function updateClouds(){
for(let c of clouds){
c.x+=c.s;
if(c.x>innerWidth+100){
c.x=-100;
c.y=Math.random()*innerHeight*0.5;
}
}
}

/* RESET */
function reset(){
score=0;
enemies=[];
speed=4.5;
spawnTimer=0;

ball.x=canvas.width/2;
ball.y=canvas.height-140;

scoreEl.textContent=0;
levelEl.textContent=level;
}

/* START */
function startGame(){
running=true;
level=1;
target=1000;
reset();
document.getElementById("menu").classList.add("hidden");
}

/* CONTROL */
let sx=0,sy=0;

canvas.addEventListener("touchstart",e=>{
sx=e.touches[0].clientX;
sy=e.touches[0].clientY;
});

canvas.addEventListener("touchmove",e=>{
if(!running)return;

let x=e.touches[0].clientX;
let y=e.touches[0].clientY;

ball.x += (x-sx)*1.3;
ball.y += (y-sy)*1.3;

sx=x; sy=y;
},{passive:true});

/* ENEMY */
function spawn(){
enemies.push({
x:Math.random()*(canvas.width-40),
y:-60,
w:40,
h:50
});
}

/* DRAW */
function drawBall(){
ctx.fillStyle="#111";
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fill();
}

function drawEnemy(e){
ctx.fillStyle="#ff4d4d";
ctx.fillRect(e.x,e.y,e.w,e.h);
}

/* LEVEL SYSTEM */
function checkLevel(){
if(score >= target){
level++;

if(level>20){
gameOver();
return;
}

/* difficulty scaling */
target += 800;
speed += 0.8;

reset();
}
}

/* GAME OVER */
function gameOver(){
running=false;
finalScore.textContent=score;
document.getElementById("gameOver").classList.remove("hidden");
}

/* UPDATE */
function update(){
if(!running)return;

/* smooth acceleration (IMPORTANT) */
speed += 0.0012;

/* spawn control */
spawnTimer++;
if(spawnTimer > Math.max(55 - level*2, 18)){
spawnTimer=0;
spawn();
}

for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y += speed;

if(
ball.x+ball.r>e.x &&
ball.x-ball.r<e.x+e.w &&
ball.y+ball.r>e.y &&
ball.y-ball.r<e.y+e.h
){
gameOver();
}

if(e.y>canvas.height+60) enemies.splice(i,1);
}

/* score */
score += 2;
scoreEl.textContent=score;

/* level check */
checkLevel();

updateClouds();
}

/* DRAW LOOP */
function draw(){
let g=ctx.createLinearGradient(0,0,0,canvas.height);
g.addColorStop(0,"#87e7ff");
g.addColorStop(1,"#d8ff9e");

ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* sky objects */
drawSun();
for(let c of clouds) drawCloud(c);

/* game */
for(let e of enemies) drawEnemy(e);
drawBall();
}

/* LOOP */
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
