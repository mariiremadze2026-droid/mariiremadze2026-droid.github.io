<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA MINI PRO</title>

<style>
body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
canvas { display:block; }

#ui {
  position:fixed;
  top:10px; left:10px;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

button {
  margin:3px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
}
</style>
</head>

<body>

<div id="ui">
💰 $<span id="money">0</span><br>
👮 Wanted: <span id="wanted">0</span><br>
🚗 Car: <span id="car">OFF</span><br>

<button onclick="enterCar()">🚗 Enter/Exit</button>
<button onclick="shoot()">🔫 Shoot</button>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

// 🔥 GAME STATE
let money = 0;
let wanted = 0;

let player = {x:0,y:0,speed:4};
let car = {x:200,y:200,speed:7};
let inCar = false;

let bullets = [];
let police = [];

// spawn police
for(let i=0;i<6;i++){
  police.push({
    x:Math.random()*1500-750,
    y:Math.random()*1500-750,
    speed:2
  });
}

function enterCar(){
  inCar = !inCar;
  document.getElementById("car").innerText = inCar ? "ON" : "OFF";
}

function shoot(){
  bullets.push({
    x:player.x,
    y:player.y,
    dx:(Math.random()*10-5),
    dy:(Math.random()*10-5)
  });

  wanted += 1;
  updateUI();
}

document.addEventListener("keydown",(e)=>{
  let s = inCar ? car.speed : player.speed;

  if(e.key==="w") move(0,-s);
  if(e.key==="s") move(0,s);
  if(e.key==="a") move(-s,0);
  if(e.key==="d") move(s,0);
});

function move(dx,dy){
  if(inCar){
    car.x += dx;
    car.y += dy;
  } else {
    player.x += dx;
    player.y += dy;
  }
}

function dist(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y);
}

function updateUI(){
  document.getElementById("money").innerText = money;
  document.getElementById("wanted").innerText = wanted;
}

function update(){
  // bullets
  for(let b of bullets){
    b.x += b.dx;
    b.y += b.dy;
  }

  // police AI
  for(let p of police){
    let target = inCar ? car : player;

    if(target.x > p.x) p.x += p.speed;
    if(target.x < p.x) p.x -= p.speed;
    if(target.y > p.y) p.y += p.speed;
    if(target.y < p.y) p.y -= p.speed;

    if(dist(p,target) < 25){
      money = Math.max(0, money - 10);
      wanted = Math.max(0, wanted - 1);
    }

    // shoot hit
    for(let b of bullets){
      if(dist(p,b) < 20){
        money += 30;
        p.x = Math.random()*1500-750;
        p.y = Math.random()*1500-750;
      }
    }
  }

  updateUI();
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  let cam = inCar ? car : player;

  let camX = cam.x - c.width/2;
  let camY = cam.y - c.height/2;

  // player
  ctx.fillStyle="lime";
  ctx.fillRect(player.x-camX,player.y-camY,15,15);

  // car
  ctx.fillStyle="cyan";
  ctx.fillRect(car.x-camX,car.y-camY,25,15);

  // police
  ctx.fillStyle="red";
  for(let p of police){
    ctx.fillRect(p.x-camX,p.y-camY,15,15);
  }

  // bullets
  ctx.fillStyle="yellow";
  for(let b of bullets){
    ctx.fillRect(b.x-camX,b.y-camY,5,5);
  }

  requestAnimationFrame(draw);
}

setInterval(update,50);
draw();
</script>

</body>
</html>
